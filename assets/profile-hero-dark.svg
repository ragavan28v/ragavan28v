      <stop offset="0%" stop-color="#343941"/>
      <stop offset="52%" stop-color="#393F49"/>
      <stop offset="100%" stop-color="#414A58"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- CARD INNER HIGHLIGHT                                  -->
    <!-- ===================================================== -->

