    <!-- BUTTON GLASS SHINE                                    -->
    <!-- ===================================================== -->

    <linearGradient
      id="buttonShine"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="100"
      y2="0"
