      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.01"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- CTA PANEL                                             -->
    <!-- ===================================================== -->

    <linearGradient
