<svg
  width="1200"
  height="580"
  viewBox="0 0 1200 580"
  xmlns="http://www.w3.org/2000/svg"
>

  <defs>

    <!-- ===================================================== -->
    <!-- MAIN GRAPHITE BACKGROUND                              -->
    <!-- ===================================================== -->

    <linearGradient
      id="pageBg"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="1200"
      y2="580"
    >
      <stop offset="0%" stop-color="#24272D"/>
      <stop offset="38%" stop-color="#282C33"/>
      <stop offset="72%" stop-color="#2C323C"/>
      <stop offset="100%" stop-color="#303946"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- AMBIENT BLUE GLOW                                     -->
    <!-- ===================================================== -->

    <radialGradient
      id="ambientGlow"
      cx="50%"
      cy="50%"
      r="50%"
    >
      <stop offset="0%" stop-color="#4D8DFF" stop-opacity="0.14"/>
      <stop offset="48%" stop-color="#3B82F6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#24272D" stop-opacity="0"/>
    </radialGradient>


    <!-- ===================================================== -->
    <!-- SECONDARY SILVER GLOW                                 -->
    <!-- ===================================================== -->

    <radialGradient
      id="secondaryGlow"
      cx="50%"
      cy="50%"
      r="50%"
    >
      <stop offset="0%" stop-color="#CBD5E1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#24272D" stop-opacity="0"/>
    </radialGradient>


    <!-- ===================================================== -->
    <!-- SYSTEM BAR                                            -->
    <!-- ===================================================== -->

    <linearGradient
      id="systemBar"
      gradientUnits="userSpaceOnUse"
      x1="45"
      y1="28"
      x2="1155"
      y2="84"
    >
      <stop offset="0%" stop-color="#30343C"/>
      <stop offset="55%" stop-color="#343A44"/>
      <stop offset="100%" stop-color="#3A424F"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- RV BADGE                                              -->
    <!-- ===================================================== -->

    <linearGradient
      id="rvBadge"
      gradientUnits="userSpaceOnUse"
      x1="62"
      y1="42"
      x2="116"
      y2="70"
    >
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- STAT CARD SURFACE                                     -->
    <!-- ===================================================== -->

    <linearGradient
      id="cardSurface"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="255"
      y2="105"
