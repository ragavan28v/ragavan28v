<svg
  width="1200"
  height="470"
  viewBox="0 0 1200 470"
  xmlns="http://www.w3.org/2000/svg"
>

  <defs>

    <!-- ===================================================== -->
    <!-- MAIN BACKGROUND GRADIENT                              -->
    <!-- Explicit coordinates for reliable GitHub rendering    -->
    <!-- ===================================================== -->

    <linearGradient
      id="bg"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="1200"
      y2="0"
    >
      <stop offset="0" stop-color="#1E40AF"/>
      <stop offset="0.35" stop-color="#2563EB"/>
      <stop offset="0.70" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- GLASS CARD GRADIENT                                   -->
    <!-- ===================================================== -->

    <linearGradient
      id="card"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="255"
      y2="90"
    >
      <stop
        offset="0"
        stop-color="#FFFFFF"
        stop-opacity="0.20"
      />

      <stop
        offset="1"
        stop-color="#FFFFFF"
        stop-opacity="0.08"
      />
    </linearGradient>


    <!-- ===================================================== -->
    <!-- CTA PANEL GRADIENT                                    -->
    <!-- ===================================================== -->

    <linearGradient
      id="cta"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="1100"
      y2="112"
    >
      <stop
        offset="0"
        stop-color="#FFFFFF"
        stop-opacity="0.20"
      />

      <stop
        offset="1"
        stop-color="#FFFFFF"
        stop-opacity="0.09"
      />
    </linearGradient>

  </defs>


  <!-- ======================================================= -->
  <!-- BACKGROUND                                              -->
  <!-- ======================================================= -->

  <rect
    width="1200"
    height="470"
    rx="18"
    fill="url(#bg)"
  />


  <!-- ======================================================= -->
  <!-- HERO IDENTITY                                           -->
  <!-- ======================================================= -->

  <text
    x="600"
    y="60"
    text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="36"
    font-weight="700"
    fill="#FFFFFF"
  >
    Hi 👋 I'm Ragavan V
  </text>


  <text
    x="600"
    y="96"
    text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="16"
    font-weight="700"
    fill="#EFF6FF"
  >
    FULL-STACK DEVELOPER · MOBILE ENGINEER · AI SYSTEMS BUILDER
  </text>


  <text
    x="600"
    y="125"
    text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="14"
    fill="#FFFFFF"
    opacity="0.90"
  >
    Building production-ready software across Web, Mobile and Artificial Intelligence
  </text>


  <!-- ======================================================= -->
  <!-- ANIMATED WAVES                                          -->
  <!-- End naturally at y=155. Stats begin at y=175.           -->
  <!-- ======================================================= -->

  <!-- WAVE 1 -->

  <path
    fill="#FFFFFF"
    fill-opacity="0.07"
    d="
      M0,115
      C220,90 430,145 650,115
      C860,85 1040,95 1200,120
      L1200,155
      L0,155
      Z
    "
  >

    <animate
      attributeName="d"
      dur="10s"
      repeatCount="indefinite"
      values="
        M0,115 C220,90 430,145 650,115 C860,85 1040,95 1200,120 L1200,155 L0,155 Z;

        M0,120 C230,145 450,90 680,120 C900,145 1050,80 1200,115 L1200,155 L0,155 Z;

        M0,115 C220,90 430,145 650,115 C860,85 1040,95 1200,120 L1200,155 L0,155 Z
      "
    />

  </path>


  <!-- WAVE 2 -->

  <path
    fill="#FFFFFF"
    fill-opacity="0.12"
    d="
      M0,130
      C230,150 450,100 680,125
      C900,150 1050,100 1200,130
      L1200,155
      L0,155
      Z
    "
  >

    <animate
      attributeName="d"
      dur="7s"
      repeatCount="indefinite"
      values="
        M0,130 C230,150 450,100 680,125 C900,150 1050,100 1200,130 L1200,155 L0,155 Z;

        M0,125 C220,105 470,150 690,120 C900,95 1060,145 1200,125 L1200,155 L0,155 Z;

        M0,130 C230,150 450,100 680,125 C900,150 1050,100 1200,130 L1200,155 L0,155 Z
      "
    />

  </path>


  <!-- WAVE 3 -->

  <path
    fill="#FFFFFF"
    fill-opacity="0.18"
    d="
      M0,142
      C180,125 400,150 620,135
      C850,110 1030,145 1200,132
      L1200,155
      L0,155
      Z
    "
  >

    <animate
      attributeName="d"
      dur="5s"
      repeatCount="indefinite"
      values="
        M0,142 C180,125 400,150 620,135 C850,110 1030,145 1200,132 L1200,155 L0,155 Z;

        M0,135 C210,150 420,115 630,142 C870,150 1040,110 1200,140 L1200,155 L0,155 Z;

        M0,142 C180,125 400,150 620,135 C850,110 1030,145 1200,132 L1200,155 L0,155 Z
      "
    />

  </path>


