      rx="13"
      fill="url(#card)"
      stroke="#FFFFFF"
      stroke-opacity="0.25"
    />

    <text
      x="127.5"
      y="40"
      text-anchor="middle"
      font-family="Segoe UI, Arial, sans-serif"
      font-size="29"
      font-weight="700"
