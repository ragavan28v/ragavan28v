    <!-- ===================================================== -->
    <!-- ANIMATED PORTFOLIO BUTTON                             -->
    <!-- ===================================================== -->

    <g transform="translate(725, 15)">


      <!-- BUTTON BACKGROUND -->

      <rect
        width="300"
        height="58"
        rx="10"
        fill="url(#buttonBg)"
        stroke="#1D4ED8"
      >

        <animate
          attributeName="stroke-opacity"
          values="0.65;1;0.65"
          dur="3.5s"
          repeatCount="indefinite"
        />

      </rect>


      <!-- GLASS REFLECTION -->

      <g clip-path="url(#buttonClip)">

        <polygon
          points="-100,0 -20,0 30,58 -50,58"
          fill="url(#shine)"
          opacity="0"
        >

          <animate
            attributeName="opacity"
            values="0;0;0.75;0.4;0;0"
            keyTimes="0;0.12;0.28;0.42;0.58;1"
            dur="4s"
            repeatCount="indefinite"
          />


          <animateTransform
            attributeName="transform"
            type="translate"
            values="0 0;0 0;420 0;420 0"
            keyTimes="0;0.12;0.58;1"
            dur="4s"
            repeatCount="indefinite"
          />

        </polygon>

      </g>


      <!-- BUTTON TEXT -->

      <text
        x="138"
        y="36"
        text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="13"
        font-weight="700"
        letter-spacing="0.5"
        fill="#FFFFFF"
