    </text>


    <!-- ===================================================== -->
    <!-- ANIMATED PORTFOLIO BUTTON                             -->
    <!-- ===================================================== -->

    <g transform="translate(715, 25)">


      <!-- BUTTON BASE -->

      <rect
        width="330"
        height="76"
        rx="12"
        fill="url(#buttonBg)"
        stroke="#1D4ED8"
      >

        <animate
          attributeName="stroke-opacity"
          values="0.65;1;0.65"
          dur="3.5s"
          repeatCount="indefinite"
        />

      </rect>


      <!-- GLASS SHINE REFLECTION -->

      <g clip-path="url(#buttonClip)">

        <polygon
          points="-120,0 -20,0 50,76 -50,76"
          fill="url(#shine)"
          opacity="0"
        >

          <animate
            attributeName="opacity"
            values="0;0;0.82;0.45;0;0"
            keyTimes="0;0.12;0.28;0.42;0.58;1"
            dur="4s"
            repeatCount="indefinite"
          />

          <animateTransform
            attributeName="transform"
            type="translate"
            values="0 0;0 0;470 0;470 0"
            keyTimes="0;0.12;0.58;1"
            dur="4s"
            repeatCount="indefinite"
          />

        </polygon>

      </g>


      <!-- BUTTON TEXT -->

      <text
        x="150"
        y="47"
        text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="17"
        font-weight="700"
        letter-spacing="0.5"
        fill="#FFFFFF"
      >
        EXPLORE PORTFOLIO
      </text>


      <!-- ANIMATED ARROW -->

      <text
        x="292"
        y="49"
        text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="25"
        fill="#FFFFFF"
      >
        →

        <animateTransform
          attributeName="transform"
          type="translate"
          values="0 0;7 0;0 0"
          dur="1.6s"
          repeatCount="indefinite"
        />

      </text>

    </g>

