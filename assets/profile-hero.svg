    <!-- ===================================================== -->

    <g transform="translate(725, 18)">


      <!-- BUTTON -->

      <rect
        width="300"
        height="66"
        rx="11"
        fill="url(#buttonBg)"
        stroke="#1D4ED8"
      >

        <animate
          attributeName="stroke-opacity"
          values="0.65;1;0.65"
          dur="3.5s"
          repeatCount="indefinite"
        />

      </rect>


      <!-- MOVING GLASS REFLECTION -->

      <g clip-path="url(#buttonClip)">

        <polygon
          points="-110,0 -20,0 40,66 -50,66"
          fill="url(#shine)"
          opacity="0"
        >

          <animate
            attributeName="opacity"
            values="0;0;0.8;0.45;0;0"
            keyTimes="0;0.12;0.28;0.42;0.58;1"
            dur="4s"
            repeatCount="indefinite"
          />

          <animateTransform
            attributeName="transform"
            type="translate"
            values="0 0;0 0;430 0;430 0"
            keyTimes="0;0.12;0.58;1"
            dur="4s"
            repeatCount="indefinite"
          />

        </polygon>

      </g>


