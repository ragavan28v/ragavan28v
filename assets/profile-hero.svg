<svg
  width="1200"
  height="580"
  viewBox="0 0 1200 620"
  xmlns="http://www.w3.org/2000/svg"
>

  <defs>

    <!-- ===================================================== -->
    <!-- PAGE BACKGROUND                                       -->
    <!-- ===================================================== -->

    <linearGradient
      id="pageBg"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="1200"
      y2="620"
    >
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.52" stop-color="#F8FAFD"/>
      <stop offset="1" stop-color="#EAF3FF"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- AMBIENT BLUE GLOW                                     -->
    <!-- ===================================================== -->

    <radialGradient id="ambientGlow">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#60A5FA" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>


    <!-- ===================================================== -->
    <!-- HERO ACCENT                                           -->
    <!-- ===================================================== -->

    <linearGradient
      id="heroAccent"
      gradientUnits="userSpaceOnUse"
      x1="490"
      y1="0"
      x2="710"
      y2="0"
    >
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- STAT CARD SURFACE                                     -->
    <!-- ===================================================== -->

    <linearGradient
      id="cardSurface"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="255"
      y2="120"
    >
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2F7FF"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- CTA PANEL                                             -->
    <!-- ===================================================== -->

    <linearGradient
      id="ctaPanel"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="1080"
      y2="125"
    >
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.6" stop-color="#F5F8FE"/>
      <stop offset="1" stop-color="#E6F0FF"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- PORTFOLIO BUTTON                                      -->
    <!-- ===================================================== -->

    <linearGradient
      id="buttonBg"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="330"
      y2="76"
    >
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- GLASS SHINE                                           -->
    <!-- ===================================================== -->

    <linearGradient
      id="shine"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="100"
      y2="0"
    >
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- DOT GRID                                              -->
    <!-- ===================================================== -->

    <pattern
      id="dotGrid"
      width="24"
      height="24"
      patternUnits="userSpaceOnUse"
    >
      <circle
        cx="2"
        cy="2"
        r="1"
        fill="#2563EB"
        opacity="0.075"
      />
    </pattern>


    <!-- ===================================================== -->
    <!-- BUTTON CLIP                                           -->
    <!-- ===================================================== -->

    <clipPath id="buttonClip">
      <rect
        width="330"
        height="76"
        rx="12"
      />
    </clipPath>

  </defs>


  <!-- ======================================================= -->
  <!-- MAIN BACKGROUND                                         -->
  <!-- ======================================================= -->

  <rect
    width="1200"
    height="620"
    rx="18"
    fill="url(#pageBg)"
  />

  <rect
    width="1200"
    height="620"
    rx="18"
    fill="url(#dotGrid)"
  />


  <!-- ======================================================= -->
  <!-- AMBIENT GLOWS                                           -->
  <!-- ======================================================= -->

