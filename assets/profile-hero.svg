<svg
  width="1200"
  height="520"
  viewBox="0 0 1200 520"
  xmlns="http://www.w3.org/2000/svg"
>

  <defs>

    <!-- ===================================================== -->
    <!-- PAGE BACKGROUND                                       -->
    <!-- ===================================================== -->

    <linearGradient
      id="pageBg"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="1200"
      y2="520"
    >
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.52" stop-color="#F8FAFD"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- AMBIENT BLUE GLOW                                     -->
    <!-- ===================================================== -->

    <radialGradient id="ambientGlow">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#60A5FA" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>


    <!-- ===================================================== -->
    <!-- HERO ACCENT                                           -->
    <!-- ===================================================== -->

    <linearGradient
      id="heroAccent"
      gradientUnits="userSpaceOnUse"
      x1="500"
      y1="0"
      x2="700"
      y2="0"
    >
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- CARD SURFACE                                          -->
    <!-- ===================================================== -->

    <linearGradient
      id="cardSurface"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="245"
      y2="92"
    >
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F8FF"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- CTA PANEL                                             -->
    <!-- ===================================================== -->

    <linearGradient
      id="ctaPanel"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="1055"
      y2="102"
    >
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.60" stop-color="#F5F8FE"/>
      <stop offset="1" stop-color="#EAF3FF"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- PORTFOLIO BUTTON                                      -->
    <!-- ===================================================== -->

    <linearGradient
      id="buttonBg"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="300"
      y2="66"
    >
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- GLASS SHINE                                           -->
    <!-- ===================================================== -->

    <linearGradient
      id="shine"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="90"
      y2="0"
    >
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.80"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>


    <!-- ===================================================== -->
    <!-- DOT GRID                                              -->
    <!-- ===================================================== -->

    <pattern
      id="dotGrid"
      width="24"
      height="24"
      patternUnits="userSpaceOnUse"
    >
      <circle
        cx="2"
        cy="2"
        r="1"
        fill="#2563EB"
        opacity="0.07"
      />
    </pattern>


    <!-- ===================================================== -->
    <!-- BUTTON CLIP                                           -->
    <!-- ===================================================== -->

    <clipPath id="buttonClip">
      <rect
        width="300"
        height="66"
        rx="11"
      />
