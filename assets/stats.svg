<svg width="1200" height="170" viewBox="0 0 1200 170"
     xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="background"
                    x1="0%" y1="0%"
                    x2="100%" y2="0%">
      <stop offset="0%" stop-color="#081120"/>
      <stop offset="40%" stop-color="#123B8F"/>
      <stop offset="75%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>

    <linearGradient id="card"
                    x1="0%" y1="0%"
                    x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity=".06"/>
    </linearGradient>

  </defs>

  <!-- Background -->

  <rect
    width="1200"
    height="170"
    rx="16"
    fill="url(#background)"
  />

  <!-- Section title -->

  <text
